name: Canary Pre-Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: write

concurrency:
  group: canary-pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-canary:
    name: Check for Canary marker
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[canary]')
    outputs:
      should_build: ${{ steps.meta.outputs.should_build }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      branch_name: ${{ steps.meta.outputs.branch_name }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Prepare Canary metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(jq -r .version package.json)
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TAG="v${VERSION}-canary-${SHORT_SHA}"

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build:
    name: Build on ${{ matrix.os }}
    needs: check-canary
    if: needs.check-canary.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App for Electron
        env:
          ELECTRON: "true"
          APP_VERSION_LABEL: lyra-canary
        run: npm run build

      - name: Package Electron App
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: canary-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/*.deb
            release/*.rpm
            release/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish Canary pre-release
    runs-on: ubuntu-latest
    needs: [check-canary, build]
    if: needs.check-canary.outputs.should_build == 'true'

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: canary-artifacts

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          echo "published_at=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Delete existing Canary release with same tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.check-canary.outputs.tag }}
        shell: bash
        run: |
          gh release delete "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes >/dev/null 2>&1 || true
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 || true

      - name: Publish Canary pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.check-canary.outputs.tag }}
          RELEASE_VERSION: ${{ needs.check-canary.outputs.version }}
          BRANCH_NAME: ${{ needs.check-canary.outputs.branch_name }}
          SHORT_SHA: ${{ needs.check-canary.outputs.short_sha }}
        shell: bash
        run: |
          published_at='${{ steps.meta.outputs.published_at }}'
          mapfile -d '' files < <(find canary-artifacts -type f -print0)
          cat > release-notes.txt <<EOF
          Canary build for branch ${BRANCH_NAME} at commit ${GITHUB_SHA}.

          警告：Canary 版本包含未经充分验证的实验性功能，极有可能存在严重问题或破坏性变更，请勿作为日常使用版本下载。

          Version: ${RELEASE_VERSION}
          Source commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          Published at: ${published_at}
          EOF

          gh release create "${RELEASE_TAG}" \
            "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Canary ${RELEASE_TAG}" \
            --notes-file release-notes.txt \
            --target "${GITHUB_SHA}" \
            --prerelease
