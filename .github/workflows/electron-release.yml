name: Build and Release Electron App

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.3). Leave empty to use package.json. Prefer same version + overwrite — do not bump for hotfixes.'
        required: false
        type: string
      overwrite:
        description: 'Overwrite existing GitHub release assets for this tag (clobber). Default true — no new upgrade tag.'
        required: false
        type: boolean
        default: true

permissions:
  contents: write # Required to upload artifacts and publish releases

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect version change
        id: check
        shell: bash
        run: |
          # Manual dispatch always proceeds (same-tag overwrite is the default path).
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Compare version with previous commit
          PREV_VERSION=$(git show HEAD^:package.json | jq -r .version)
          CURR_VERSION=$(cat package.json | jq -r .version)
          
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURR_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($CURR_VERSION)"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  prepare-release:
    name: Prepare release target
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      overwrite: ${{ steps.meta.outputs.overwrite }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Determine release version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r .version package.json)
          fi

          OVERWRITE="true"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.overwrite }}" = "false" ]; then
            OVERWRITE="false"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "overwrite=${OVERWRITE}" >> "$GITHUB_OUTPUT"

      - name: Clean up orphaned release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists — will overwrite assets (no new upgrade tag)."
            exit 0
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Found orphaned tag ${RELEASE_TAG} without a matching release, deleting it."
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          else
            echo "No orphaned tag found for ${RELEASE_TAG}."
          fi

  release:
    name: Build on ${{ matrix.os }}
    needs: [check-version, prepare-release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json version
        if: github.event.inputs.version != ''
        shell: bash
        env:
          TARGET_VERSION: ${{ github.event.inputs.version }}
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          if [ "${CURRENT_VERSION}" = "${TARGET_VERSION}" ]; then
            echo "package.json version already set to ${TARGET_VERSION}; skipping npm version."
            exit 0
          fi

          npm version "${TARGET_VERSION}" --no-git-tag-version

      - name: Generate Release Notes from template
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || needs.prepare-release.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          MACOS_UNSIGNED_HELP_URL: https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/desktop/macos-app-damaged.md
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const templatePath = path.join('.github', 'release-draft-template.md');
          const outputPath = path.join('build', 'release-notes.md');
          let template = fs.readFileSync(templatePath, 'utf8');

          const replacements = {
            VERSION: process.env.RELEASE_VERSION || '',
            TAG: process.env.RELEASE_TAG || '',
            MACOS_UNSIGNED_HELP_URL: process.env.MACOS_UNSIGNED_HELP_URL || '',
          };

          for (const [key, value] of Object.entries(replacements)) {
            template = template.split(`{{${key}}}`).join(value);
          }

          fs.mkdirSync(path.dirname(outputPath), { recursive: true });
          fs.writeFileSync(outputPath, `${template.trim()}\n`);
          NODE

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App for Electron
        env:
          ELECTRON: "true"
        run: npm run build

      - name: Package Electron Release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            build/release-notes.md
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish draft release
    needs: [check-version, prepare-release, release]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES_FILE=$(find release-artifacts -type f -name 'release-notes.md' | head -n 1)
          if [ -z "${NOTES_FILE}" ]; then
            echo "Unable to locate release notes artifact"
            exit 1
          fi
          cp "${NOTES_FILE}" release-notes.md

      - name: Publish GitHub release (overwrite same tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          OVERWRITE: ${{ needs.prepare-release.outputs.overwrite }}
        shell: bash
        run: |
          mapfile -d '' files < <(find release-artifacts -type f ! -name 'release-notes.md' -print0)

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ "${OVERWRITE}" != "true" ]; then
              echo "Release ${RELEASE_TAG} already exists and overwrite=false; refusing to create an upgrade tag."
              exit 1
            fi
            echo "Overwriting assets on existing ${RELEASE_TAG} (no version upgrade)."
            gh release upload "${RELEASE_TAG}" \
              "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes-file release-notes.md \
              --title "${RELEASE_TAG}" \
              --draft=false
          else
            gh release create "${RELEASE_TAG}" \
              "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              --latest
          fi

