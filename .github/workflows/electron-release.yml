name: Build and Release Electron App

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.1). Leave empty to use package.json version.'
        required: false
        type: string
      publish_aur_only:
        description: 'Skip desktop builds and only publish the AUR package'
        required: false
        default: false
        type: boolean

permissions:
  contents: write # Required to upload artifacts and publish releases

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect version change
        id: check
        shell: bash
        run: |
          # If triggered manually, always proceed
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Compare version with previous commit
          PREV_VERSION=$(git show HEAD^:package.json | jq -r .version)
          CURR_VERSION=$(cat package.json | jq -r .version)
          
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURR_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($CURR_VERSION)"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  prepare-release:
    name: Prepare release target
    needs: check-version
    if: needs.check-version.outputs.changed == 'true' && github.event.inputs.publish_aur_only != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Determine release version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r .version package.json)
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Clean up orphaned release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists, keeping current release/tag state."
            exit 0
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Found orphaned tag ${RELEASE_TAG} without a matching release, deleting it."
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          else
            echo "No orphaned tag found for ${RELEASE_TAG}."
          fi

  release:
    name: Build on ${{ matrix.os }}
    needs: [check-version, prepare-release]
    if: needs.check-version.outputs.changed == 'true' && github.event.inputs.publish_aur_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update package.json version
        if: github.event.inputs.version != ''
        shell: bash
        env:
          TARGET_VERSION: ${{ github.event.inputs.version }}
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          if [ "${CURRENT_VERSION}" = "${TARGET_VERSION}" ]; then
            echo "package.json version already set to ${TARGET_VERSION}; skipping npm version."
            exit 0
          fi

          npm version "${TARGET_VERSION}" --no-git-tag-version

      - name: Generate Release Notes from template
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || needs.prepare-release.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          MACOS_UNSIGNED_HELP_URL: https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/desktop/macos-app-damaged.md
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const templatePath = path.join('.github', 'release-draft-template.md');
          const outputPath = path.join('build', 'release-notes.md');
          let template = fs.readFileSync(templatePath, 'utf8');

          const replacements = {
            VERSION: process.env.RELEASE_VERSION || '',
            TAG: process.env.RELEASE_TAG || '',
            MACOS_UNSIGNED_HELP_URL: process.env.MACOS_UNSIGNED_HELP_URL || '',
          };

          for (const [key, value] of Object.entries(replacements)) {
            template = template.split(`{{${key}}}`).join(value);
          }

          fs.mkdirSync(path.dirname(outputPath), { recursive: true });
          fs.writeFileSync(outputPath, `${template.trim()}\n`);
          NODE

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App for Electron
        env:
          ELECTRON: "true"
        run: npm run build

      - name: Package Electron Release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/*.deb
            release/*.rpm
            release/*.tar.gz
            build/release-notes.md
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish draft release
    needs: [check-version, prepare-release, release]
    if: needs.check-version.outputs.changed == 'true' && github.event.inputs.publish_aur_only != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES_FILE=$(find release-artifacts -type f -name 'release-notes.md' | head -n 1)
          if [ -z "${NOTES_FILE}" ]; then
            echo "Unable to locate release notes artifact"
            exit 1
          fi
          cp "${NOTES_FILE}" release-notes.md

      - name: Publish GitHub draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          mapfile -d '' files < <(find release-artifacts -type f ! -name 'release-notes.md' -print0)

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes-file release-notes.md \
              --title "${RELEASE_TAG}"
          else
            gh release create "${RELEASE_TAG}" \
              "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}" \
              --draft
          fi

  publish-aur:
    name: Publish AUR package
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check AUR secrets
        id: aur-secrets
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_REPO_SSH_URL: ${{ secrets.AUR_REPO_SSH_URL }}
        run: |
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" || -z "${AUR_REPO_SSH_URL}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "AUR secrets are not configured; skipping AUR publish."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare AUR metadata
        if: steps.aur-secrets.outputs.configured == 'true'
        run: ./packaging/aur/lyra-music-player-bin/update.sh

      - name: Set up SSH key
        if: steps.aur-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          install -dm700 ~/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF

      - name: Push package to AUR
        if: steps.aur-secrets.outputs.configured == 'true'
        shell: bash
        env:
          AUR_REPO_SSH_URL: ${{ secrets.AUR_REPO_SSH_URL }}
        run: |
          git clone "${AUR_REPO_SSH_URL}" aur-repo
          cp packaging/aur/lyra-music-player-bin/PKGBUILD aur-repo/PKGBUILD
          cp packaging/aur/lyra-music-player-bin/.SRCINFO aur-repo/.SRCINFO
          cp packaging/aur/lyra-music-player-bin/lyra-music-player.desktop aur-repo/lyra-music-player.desktop
          cp packaging/aur/lyra-music-player-bin/lyra-music-player.png aur-repo/lyra-music-player.png
          cd aur-repo
          if git diff --quiet -- PKGBUILD .SRCINFO lyra-music-player.desktop lyra-music-player.png; then
            echo "No AUR changes to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO lyra-music-player.desktop lyra-music-player.png
          git commit -m "Update to v$(jq -r .version ../package.json)"
          git push
